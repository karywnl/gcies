<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCIES</title>

    <!-- SEO -->
    <meta name="description" content="Explore any place on Earth. GCIES gives you AI-generated geo-cultural insights — landmarks, history, culture, geography and more — for any city, town or village." />
    <meta name="keywords" content="geography, explore, location insights, AI, culture, landmarks, travel" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GCIES — Geo-Contextual Information Extraction and Summarization" />
    <meta property="og:description" content="Explore any place on Earth. Get AI-generated insights on landmarks, history, culture, and geography for any location." />
    <meta property="og:url" content="https://gcies.onrender.com" />
    <meta property="og:image" content="https://gcies.onrender.com/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GCIES — Explore Any Place on Earth" />
    <meta name="twitter:description" content="AI-generated geo-cultural insights for any city, town, or village on Earth." />
    <meta name="twitter:image" content="https://gcies.onrender.com/og-image.png" />
    <script>
      (function() {
        var saved = localStorage.getItem('gcies_theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
